<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chill-Bill | DAGBEZORGING Orders</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f4f8;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:20px 30px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.logo{font-size:28px;font-weight:700;letter-spacing:1px}
.logo span{color:#4fc3f7}
.header-right{display:flex;align-items:center;gap:16px}
.updated{font-size:12px;color:rgba(255,255,255,.6)}
.refresh-btn{background:#4fc3f7;color:#1a1a2e;border:none;padding:10px 24px;border-radius:25px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.refresh-btn:hover{background:#81d4fa;transform:scale(1.05)}
.refresh-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.container{max-width:1400px;margin:30px auto;padding:0 20px}
.toolbar{background:#fff;border-radius:12px;padding:16px 24px;margin-bottom:20px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 8px rgba(0,0,0,.08);flex-wrap:wrap}
.filter-label{font-size:13px;font-weight:600;color:#555;white-space:nowrap}
.filter-select{background:#f8f9fa;border:1.5px solid #e0e0e0;border-radius:20px;padding:8px 20px;font-size:14px;font-weight:500;color:#333;cursor:pointer;outline:none;transition:border-color .2s;min-width:180px}
#methodFilter{min-width:130px}
.filter-select:focus,.filter-select:hover{border-color:#4fc3f7}
.filter-count{font-size:13px;color:#999;margin-left:auto}
.print-btn{background:#1a1a2e;color:#fff;border:none;padding:9px 22px;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.print-btn:hover:not(:disabled){background:#0f1729}
.print-btn:disabled{opacity:.35;cursor:not-allowed}
.print-btn-group{position:relative;display:inline-flex;align-items:stretch}
.print-btn-main{border-radius:20px 0 0 20px}
.print-btn-caret{background:#1a1a2e;color:#fff;border:none;border-left:1px solid rgba(255,255,255,.25);padding:9px 12px;border-radius:0 20px 20px 0;font-size:12px;cursor:pointer;transition:all .2s}
.print-btn-caret:hover:not(:disabled){background:#0f1729}
.print-btn-caret:disabled{opacity:.35;cursor:not-allowed}
.print-dropdown-menu{display:none;position:absolute;top:calc(100% + 6px);left:0;background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.18);min-width:240px;z-index:20;overflow:hidden}
.print-dropdown-item{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 16px;font-size:14px;color:#333;cursor:pointer;white-space:nowrap}
.print-dropdown-item:hover{background:#f0f4f8}
.print-dropdown-item.active{background:#f0f4f8;font-weight:600}
.pdi-check{color:#1a1a2e;font-weight:700;opacity:0}
.print-dropdown-item.active .pdi-check{opacity:1}
.print-btn-arrow{font-size:11px}
.stats{background:#fff;border-radius:12px;padding:20px 30px;margin-bottom:24px;display:flex;align-items:center;gap:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.count{font-size:48px;font-weight:800;color:#1a1a2e;line-height:1}
.stats-labels{display:flex;flex-direction:column;gap:6px}
.stats-title{font-size:14px;color:#666}
.badge{padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700;display:inline-block}
.badge-green{background:#e8f5e9;color:#2e7d32}
.badge-blue{background:#e3f2fd;color:#1565c0}
.spinner{width:16px;height:16px;border:2px solid rgba(26,26,46,.3);border-top-color:#1a1a2e;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:80px 20px;color:#999}
.empty-icon{font-size:64px;margin-bottom:16px}
.empty p{font-size:16px}
.error-box{background:#ffebee;color:#c62828;border-radius:12px;padding:16px 20px;margin-bottom:16px;font-weight:500}
.orders-table-wrap{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
.orders-table{width:100%;border-collapse:collapse}
.orders-table thead tr{background:#fff;border-bottom:2px solid #f0f4f8}
.orders-table thead th{padding:14px 16px;text-align:left;font-size:11px;font-weight:700;color:#4fc3f7;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.orders-table thead th:first-child{width:40px;padding-left:20px}
.orders-table tbody tr{border-bottom:1px solid #f0f4f8;transition:background .15s}
.orders-table tbody tr:last-child{border-bottom:none}
.orders-table tbody tr:hover{background:#f8fbff}
.orders-table tbody td{padding:14px 16px;vertical-align:middle;font-size:14px;color:#333}
.orders-table tbody td:first-child{padding-left:20px}
.order-checkbox{width:16px;height:16px;cursor:pointer;accent-color:#4fc3f7}
.status-text{font-weight:600;color:#1a1a2e;font-size:13px}
.shop-status-icon{width:28px;height:28px;background:#4caf50;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.order-num-link{color:#1565c0;font-weight:700;font-size:14px;text-decoration:none}
.order-num-link:hover{text-decoration:underline}
.order-date{font-size:12px;color:#4fc3f7;margin-top:3px}
.ship-method-wrap{display:flex;align-items:center;gap:10px}
.ship-icon{width:28px;height:28px;border-radius:6px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ship-name{font-weight:500;color:#333;font-size:13px}
.inhoud-items{font-weight:600;color:#1a1a2e;font-size:13px}
.inhoud-detail{font-size:12px;color:#666;margin-top:2px}
.klant-naam{color:#1565c0;font-weight:600;font-size:13px}
.klant-email{font-size:12px;color:#666;margin-top:2px}
.klant-adres{font-size:12px;color:#666;margin-top:2px;display:flex;align-items:center;gap:4px}
.flag{font-size:14px}
.geprint-badge{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;display:inline-block;white-space:nowrap;border:none}
.geprint-geen{background:#f5f5f5;color:#999}
.geprint-pakbon{background:#fff3e0;color:#e65100}
.geprint-beide{background:#e8f5e9;color:#2e7d32}
</style>
</head>
<body>
<div class="header">
<div class="logo">Chill<span>-Bill</span></div>
<div class="header-right">
<span class="updated" id="updated"></span>
<button class="refresh-btn" id="refreshBtn" onclick="loadOrders()">
<span>&#8635;</span> Vernieuwen
</button>
</div>
</div>
<div class="container">
<div class="stats">
<div class="count" id="count">0</div>
<div class="stats-labels">
<span class="stats-title">Orders klaar voor verzending</span>
<div>
<span class="badge badge-green">&#x1F69A; DAGBEZORGING</span>
<span class="badge badge-blue" style="margin-left:6px">Klaar voor verzending</span>
</div>
</div>
</div>
<div class="toolbar">
<div class="print-btn-group">
<button type="button" class="print-btn print-btn-main" id="printBtn" onclick="executeCurrentPrintAction()" disabled>Aanmaken: <span id="printModeLabel">Pakbonnen</span> (<span id="selCount">0</span>)</button>
<button type="button" class="print-btn-caret" id="printCaretBtn" onclick="toggleVerzendMenu(event)" disabled><span class="print-btn-arrow">&#x25BE;</span></button>
<div class="print-dropdown-menu" id="verzendMenu">
<div class="print-dropdown-item" data-mode="verzend" onclick="setPrintMode('verzend')"><span>Verzendinformatie</span><span class="pdi-check">&#10003;</span></div>
<div class="print-dropdown-item" data-mode="beide" onclick="setPrintMode('beide')"><span>Pakbonnen + verzendinformatie</span><span class="pdi-check">&#10003;</span></div>
<div class="print-dropdown-item active" data-mode="pakbon" onclick="setPrintMode('pakbon')"><span>Pakbonnen</span><span class="pdi-check">&#10003;</span></div>
</div>
</div> <select class="filter-select" id="methodFilter" onchange="applyFilter()">
<option value="">Alle DAGBEZORGING methodes (0)</option>
</select>
<select class="filter-select" id="printFilter" onchange="applyFilter()">
<option value="">Alle (geprinte doc)</option>
<option value="geen">Geen geprint</option>
<option value="pakbon">Enkel pakbon</option>
<option value="beide">Beide geprint</option>
</select>

<span class="filter-count" id="filterCount"></span>
</div>
<div id="errorBox"></div>
<div id="ordersContainer">
<div class="empty"><div class="empty-icon">&#9203;</div><p>Orders worden geladen...</p></div>
</div>
</div>
<script>
var allOrders = [];
var allMethods = [];

async function loadOrders() {
var btn = document.getElementById('refreshBtn');
btn.disabled = true;
btn.innerHTML = '<span class="spinner"></span> Laden...';
document.getElementById('errorBox').innerHTML = '';
try {
var res = await fetch('/api/orders');
if (!res.ok) throw new Error('Server error: ' + res.status);
var data = await res.json();
allOrders = data.orders || [];
allMethods = data.shippingMethods || [];
populateFilter(allMethods);
applyFilter();
document.getElementById('updated').textContent = 'Bijgewerkt: ' + new Date().toLocaleTimeString('nl-NL');
} catch(err) {
document.getElementById('errorBox').innerHTML = '<div class="error-box">Fout: ' + err.message + '</div>';
document.getElementById('ordersContainer').innerHTML = '<div class="empty"><div class="empty-icon">&#10060;</div><p>Kon orders niet ophalen</p></div>';
document.getElementById('count').textContent = '!';
} finally {
btn.disabled = false;
btn.innerHTML = '<span>&#8635;</span> Vernieuwen';
}
}

function populateFilter(methods) {
var sel = document.getElementById('methodFilter');
var cur = sel.value;
sel.innerHTML = '<option value="">Verzendmethode</option>';
methods.forEach(function(m) {
var opt = document.createElement('option');
opt.value = m;
opt.textContent = m;
if (m === cur) opt.selected = true;
sel.appendChild(opt);
});
}

function applyFilter() {
var selectedMethod = document.getElementById('methodFilter').value;
var selectedPrint = document.getElementById('printFilter').value;
var filtered = allOrders;
if (selectedMethod) filtered = filtered.filter(function(o){ return o._shippingMethod === selectedMethod; });
if (selectedPrint) filtered = filtered.filter(function(o){ return (o._printStatus || 'geen') === selectedPrint; });
document.getElementById('count').textContent = filtered.length;
document.getElementById('filterCount').textContent = (selectedMethod || selectedPrint)
? filtered.length + ' van ' + allOrders.length + ' orders'
: allOrders.length + ' orders totaal';
renderOrders(filtered);
updateSelection();
}

function updateSelection() {
var checked = document.querySelectorAll('.order-checkbox:checked');
var __selCountEl = document.getElementById('selCount'); if (__selCountEl) __selCountEl.textContent = checked.length;
document.getElementById('printBtn').disabled = checked.length === 0;
var __caretBtn = document.getElementById('printCaretBtn'); if (__caretBtn) __caretBtn.disabled = checked.length === 0;
}

async function toggleBeide(orderNumber, currentStatus) {
if (currentStatus === 'geen') return;
var newStatus = currentStatus === 'beide' ? 'pakbon' : 'beide';
await fetch('/api/print-status', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ orderNumbers:[orderNumber], status:newStatus }) });
allOrders.forEach(function(o){ if (o._ordNummer === orderNumber) o._printStatus = newStatus; });
applyFilter();
}

function getFlagEmoji(countryCode) {
if (!countryCode) return '';
var code = countryCode.toUpperCase();
return code.replace(/./g, function(c) {
return String.fromCodePoint(c.charCodeAt(0) + 127397);
});
}

function renderOrders(orders) {
var c = document.getElementById('ordersContainer');
if (!orders.length) {
c.innerHTML = '<div class="empty"><div class="empty-icon">&#9989;</div><p>Geen orders gevonden</p></div>';
return;
}
var rows = orders.map(function(o) {
var klant = o._klant || [o.firstname, o.middlename, o.lastname].filter(Boolean).join(' ') || o.email || 'Onbekend';
var ordNummer = o._ordNummer || o.number || String(o.id) || '-';
var total = o.priceIncl ? String.fromCharCode(8364) + ' ' + parseFloat(o.priceIncl).toFixed(2).replace('.',',') : '-';
var date = o.createdAt ? new Date(o.createdAt).toLocaleDateString('nl-NL', {day:'2-digit',month:'2-digit',year:'numeric'}) : '-';
var ship = o._shippingMethod || 'DAGBEZORGING';
var email = o.email || (o.billingAddress && o.billingAddress.email) || '';
var postcode = o.addressBillingZipcode || '';
var city = o.addressBillingCity || '';
var countryCode = (o.addressBillingCountry && (o.addressBillingCountry.code || o.addressBillingCountry.code3) || '').toUpperCase();
var flag = getFlagEmoji(countryCode);
var prods = Array.isArray(o.products) ? o.products : [];
var itemCount = o.itemCount || o.productsCount || o.quantityOrdered || (prods.length > 0 ? prods.length : null);
var itemLabel = itemCount ? itemCount + ' Item' + (itemCount !== 1 ? 's' : '') : '-';
var qty = o.quantityOrdered || (prods.length > 0 ? prods.reduce(function(s,p){return s+(p.quantityOrdered||1);},0) : null);
var qtyText = qty ? 'Hoeveelheid: ' + qty : '';
var valText = total !== '-' ? 'Waarde: ' + total : '';
var printStatus = o._printStatus || 'geen';
var printLabel = printStatus === 'beide' ? 'Beide geprint' : (printStatus === 'pakbon' ? 'Enkel pakbon' : 'Geen geprint');
var printBadge = '<button type="button" class="geprint-badge geprint-' + printStatus + '" onclick="toggleBeide(\'' + ordNummer + '\',\'' + printStatus + '\')" title="Klik om te wisselen tussen Enkel pakbon en Beide geprint">' + printLabel + '</button>';

return '<tr><td><input type="checkbox" class="order-checkbox" data-id="' + o.id + '" data-num="' + ordNummer + '" onchange="updateSelection()"></td><td><span class="status-text">Wacht op verzending</span></td><td><div class="shop-status-icon">&#10003;</div></td><td><a class="order-num-link" href="#">' + ordNummer + '</a><div class="order-date">' + date + '</div></td><td><div class="ship-method-wrap"><div class="ship-icon">&#x1F69A;</div><span class="ship-name">' + ship + '</span></div></td><td><div class="inhoud-items">' + itemLabel + '</div>' + (qtyText ? '<div class="inhoud-detail">' + qtyText + '</div>' : '') + (valText ? '<div class="inhoud-detail">' + valText + '</div>' : '') + '</td><td><div class="klant-naam">' + (flag ? flag + ' ' : '') + klant + '</div>' + (email ? '<div class="klant-email">' + email + '</div>' : '') + ((postcode||city||countryCode) ? '<div class="klant-adres">' + [[postcode,city].filter(Boolean).join(', '), countryCode].filter(Boolean).join(' ') + '</div>' : '') + '</td><td>' + printBadge + '</td></tr>';
}).join('');
c.innerHTML = '<div class="orders-table-wrap"><table class="orders-table"><thead><tr><th></th><th>STATUS</th><th>SHOP STATUS</th><th>ORDER</th><th>VERZENDMETHODE</th><th>INHOUD VAN DE BESTELLING</th><th>KLANT</th><th>GEPRINT</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
}

function formatOrderDate(iso) {
var d = new Date(iso);
var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var dd = String(d.getDate()).padStart(2,'0');
var hh = String(d.getHours()).padStart(2,'0');
var mi = String(d.getMinutes()).padStart(2,'0');
return months[d.getMonth()] + ' ' + dd + ', ' + d.getFullYear() + ', ' + hh + ':' + mi;
}

var MONTHS_NL = {januari:1,februari:2,maart:3,april:4,mei:5,juni:6,juli:7,augustus:8,september:9,oktober:10,november:11,december:12};

function parseGewenst(shippingMethod, refDateIso) {
var m = /([0-9]{1,2})\s+(januari|februari|maart|april|mei|juni|juli|augustus|september|oktober|november|december)\s*\(([0-9]{1,2}):([0-9]{2})\s*-\s*([0-9]{1,2}):([0-9]{2})\)/i.exec(shippingMethod || '');
if (!m) return { van: '', tot: '' };
var day = parseInt(m[1], 10);
var month = MONTHS_NL[m[2].toLowerCase()];
var vanTijd = m[3] + ':' + m[4];
var totTijd = m[5] + ':' + m[6];
var ref = refDateIso ? new Date(refDateIso) : new Date();
var year = ref.getFullYear();
var candidate = new Date(year, month - 1, day);
var diffMonths = (candidate.getFullYear() - ref.getFullYear()) * 12 + (candidate.getMonth() - ref.getMonth());
if (diffMonths < -6) year += 1;
var dateStr = day + '-' + month + '-' + year;
return { van: dateStr + ' van ' + vanTijd + 'uur', tot: dateStr + ' tot ' + totTijd };
}

function toggleVerzendMenu(e) {
e.stopPropagation();
var menu = document.getElementById('verzendMenu');
if (!menu) return;
menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

function getSelectedOrders() {
var checked = Array.from(document.querySelectorAll('.order-checkbox:checked'));
var ids = checked.map(function(cb){ return cb.getAttribute('data-id'); });
var nums = checked.map(function(cb){ return cb.getAttribute('data-num'); });
var orders = ids.map(function(id){ return allOrders.find(function(o){ return String(o.id) === String(id); }); }).filter(Boolean);
return { ids: ids, nums: nums, orders: orders };
}

var printMode = 'pakbon';
var PRINT_MODE_LABELS = { pakbon: 'Pakbonnen', verzend: 'Verzendinformatie', beide: 'Pakbonnen + verzendinformatie' };

function setPrintMode(mode) {
printMode = mode;
var label = document.getElementById('printModeLabel'); if (label) label.textContent = PRINT_MODE_LABELS[mode];
document.querySelectorAll('.print-dropdown-item').forEach(function(el) { el.classList.toggle('active', el.getAttribute('data-mode') === mode); });
var menu = document.getElementById('verzendMenu');
if (menu) menu.style.display = 'none';
}

async function executeCurrentPrintAction() {
var sel = getSelectedOrders();
if (!sel.orders.length) return;
if (printMode === 'pakbon') { await printPakbonnen(sel); }
else if (printMode === 'verzend') { await printVerzendinformatie(sel.orders); }
else if (printMode === 'beide') { await printPakbonnen(sel); await printVerzendinformatie(sel.orders); }
}

function loadScript(src) {
return new Promise(function(resolve, reject) {
if (document.querySelector('script[src="' + src + '"]')) return resolve();
var s = document.createElement('script');
s.src = src;
s.onload = resolve;
s.onerror = reject;
document.head.appendChild(s);
});
}

async function printVerzendinformatie(preOrders) {
var menu = document.getElementById('verzendMenu');
if (menu) menu.style.display = 'none';
var orders;
if (preOrders) {
orders = preOrders;
} else {
var checked = Array.from(document.querySelectorAll('.order-checkbox:checked'));
if (!checked.length) return;
var ids = checked.map(function(cb){ return cb.getAttribute('data-id'); });
orders = ids.map(function(id){ return allOrders.find(function(o){ return String(o.id) === String(id); }); }).filter(Boolean);
}
if (!orders.length) return;
var methods = Array.from(new Set(orders.map(function(o){ return o._shippingMethod; })));
if (methods.length > 1) { alert('Selecteer alleen orders met dezelfde verzendmethode voor de Verzendinformatie-export.'); return; }
var method = methods[0] || 'Verzendinformatie';

try {
await loadScript('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js');

var headers = ['Contact (lossen)','Bedrijf (lossen)','Email (lossen)','Mobiel (lossen)','Straat (lossen)','Huisnummer (lossen)','Toevoeging','Postcode (lossen)','Plaats (lossen)','Land (lossen)','Gewenst (lossen)','Gewenst (lossen, tot)','Aantal - 1','Details - 1','Verpakking','Notities (lossen)'];

var rows = orders.map(function(o) {
var naam = o.addressShippingName || o._klant || [o.firstname, o.middlename, o.lastname].filter(Boolean).join(' ') || '';
var gewenst = parseGewenst(o._shippingMethod, o.createdAt);
var land = (o.addressShippingCountry && (o.addressShippingCountry.title || o.addressShippingCountry.code)) || '';
var notities = (o.comment || o.memo || '').toString();
return [
naam,
naam,
o.email || '',
o.mobile || o.phone || '',
o.addressShippingStreet || '',
o.addressShippingNumber || '',
o.addressShippingExtension || '',
o.addressShippingZipcode || '',
o.addressShippingCity || '',
land,
gewenst.van,
gewenst.tot,
1,
'Diepvries',
'',
notities
];
});

var wb = XLSX.utils.book_new();
var ws = XLSX.utils.aoa_to_sheet([headers].concat(rows));
XLSX.utils.book_append_sheet(wb, ws, 'Verzendinformatie');

var countRes = await fetch('/api/verzend-print-count', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ shippingMethod: method }) });
var countData = await countRes.json();
var safeMethod = method.replace(/[\\\/:*?"<>|]/g, '').trim();
var filename = safeMethod + ' ' + countData.count + '.xlsx';

XLSX.writeFile(wb, filename);
} catch(e) {
alert('Fout bij genereren Verzendinformatie: ' + e.message);
}
}

loadOrders();
</script>
